version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: sentinelai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinelai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sentinelai_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/workspace
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sentinelai
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwttokenchangeinproduction12345
      - WAF_PROXY_PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-1.5-flash
    depends_on:
      - db
      - redis

  waf_proxy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai_waf
    restart: always
    command: python run_waf.py
    volumes:
      - ./backend:/workspace
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sentinelai
      - REDIS_URL=redis://redis:6379/0
      - WAF_PROXY_PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-1.5-flash
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai_worker
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/workspace
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sentinelai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-1.5-flash
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelai_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
